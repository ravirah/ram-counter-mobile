name: Keep Render Backend Warm

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Ping health endpoint
        env:
          HEALTH_URL: https://bhagwan-backend-u0n9.onrender.com/api/health
        run: |
          echo "Pinging $HEALTH_URL"
          status=$(curl -sS -o response.json -w "%{http_code}" --max-time 30 "$HEALTH_URL")
          cat response.json
          if [ "$status" != "200" ]; then
            echo "Health check failed with status $status"
            exit 1
          fi
