# FLOW 5 — Screen navigation smoke: every user tab renders on the real device.
# Logs in, then visits Count → Stats → Profile via the tab testIDs and asserts a known element.
appId: com.ramcounter.app
env:
  MOBILE: "9998887776"
  NAME: "Maestro Test"
---
- launchApp:
    clearState: true
- runFlow:
    file: login.yaml
    env:
      MOBILE: "${MOBILE}"
      NAME: "${NAME}"
# Counter tab (default) — keypad present.
- assertVisible:
    id: "key-R"
- takeScreenshot: 05a-counter
# Stats tab.
- tapOn:
    id: "tab-stats"
- extendedWaitUntil:
    visible:
      text: "Total Chants|Streak|Average|Devotion"
    timeout: 15000
- takeScreenshot: 05b-stats
# Profile tab.
- tapOn:
    id: "tab-profile"
- extendedWaitUntil:
    visible:
      text: "Account|Logout|${NAME}"
    timeout: 15000
- takeScreenshot: 05c-profile
# Back to Count.
- tapOn:
    id: "tab-count"
- assertVisible:
    id: "key-R"
