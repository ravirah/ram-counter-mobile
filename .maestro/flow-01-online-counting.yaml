# FLOW 1 — Online counting works and reaches the backend.
# Drives 5 counts via the R-A-M keypad (each R+A+M = one "Ram" = +1).
# Oracle: after this runs, confirm in the admin panel (or /drift-report) that this user's
# total went up by exactly 5 — nothing lost, nothing doubled.
# The today-count assert assumes TODAY started at 0 (reset the test user first, or just verify
# the +5 delta in the admin panel).
appId: com.ramcounter.app
env:
  MOBILE: "9998887776"
  NAME: "Maestro Test"
---
- launchApp:
    clearState: true
- runFlow:
    file: login.yaml
    env:
      MOBILE: "${MOBILE}"
      NAME: "${NAME}"
- repeat:
    times: 5
    commands:
      - tapOn: { id: "key-R" }
      - tapOn: { id: "key-A" }
      - tapOn: { id: "key-M" }
      - waitForAnimationToEnd:
          timeout: 1500
- assertVisible:
    id: "today-count"
    text: "5"
- takeScreenshot: 01-online-counting
