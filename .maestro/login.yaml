# Reusable sub-flow: log in with a mobile + name and land on the counter screen.
# Uses testIDs added to the app (login-mobile-input / login-name-input / login-submit-button).
#
# NOTE: the account must be APPROVED (status='approved') to reach the counter — approve your
# test account once in the admin panel. Name is (re)typed each run so it works for both an
# existing user (autofilled) and a brand-new number.
appId: com.ramcounter.app
---
- tapOn:
    id: "login-mobile-input"
- inputText: "${MOBILE}"
- hideKeyboard
- waitForAnimationToEnd:
    timeout: 4000
# The name field renders once the mobile is 10 digits. Clear + type so autofill can't concatenate.
- tapOn:
    id: "login-name-input"
- eraseText: 40
- inputText: "${NAME}"
- hideKeyboard
- tapOn:
    id: "login-submit-button"
# Confirm we reached the counter screen (the R key is unique to it).
- extendedWaitUntil:
    visible:
      id: "key-R"
    timeout: 20000
