# FLOW 2 — Background flush (Android-specific: AppState 'background'/'inactive').
# Counts a few, sends the app to the background (Home) so the background-flush listener fires,
# then brings it back. Oracle: the admin panel should reflect all taps after backgrounding —
# proving the flush-on-background path works on the real Android runtime (not testable on web).
appId: com.ramcounter.app
env:
  MOBILE: "9998887776"
  NAME: "Maestro Test"
---
- launchApp:
    clearState: true
- runFlow:
    file: login.yaml
    env:
      MOBILE: "${MOBILE}"
      NAME: "${NAME}"
- repeat:
    times: 3
    commands:
      - tapOn: "^R$"
      - tapOn: "^A$"
      - tapOn: "^M$"
      - waitForAnimationToEnd:
          timeout: 1500
# Send to background — this fires the AppState 'background'/'inactive' flush.
- pressKey: Home
- waitForAnimationToEnd:
    timeout: 4000
# Bring it back to the foreground (resume) — triggers the on-focus flush + reload.
- launchApp
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: 02-after-background-resume
# → Verify in the admin panel that this user's total includes the 3 taps.
