<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#000000" />
  <meta name="description" content="राम Counter - Daily Devotion Tracker" />
  <title>राम Counter</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
        'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
        sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    #root {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    code {
      font-family: source-code-pro, Menlo, Monaco, Consolas, 'Courier New',
        monospace;
    }

    #recaptcha-container {
      display: none;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- reCAPTCHA container for Firebase phone authentication -->
  <div id="recaptcha-container"></div>

  <!-- Firebase SDK and other required scripts -->
  <script async defer src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXX"></script>

  <script>
    // Initialize Firebase analytics if needed
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
  </script>
</body>
</html>
